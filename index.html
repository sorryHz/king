<label>วันที่ (DD/MM/YYYY)</label>
    <input type="text" id="f-number" placeholder="01/01/2024">
    
    <label>ลำดับ/คอลัมน์ B</label>
    <input type="text" id="f-colB" placeholder="ระบุลำดับ">
    
    <label>สถานะ (Status)</label>
    <select id="f-status">
      <option value="Not Contacted">Not Contacted</option>
      <option value="Pending">Pending</option>
      <option value="Contacted">Contacted</option>
    </select>
    
    <label>ผลลัพธ์ (Result)</label>
    <select id="f-result-select">
      <option value="">-- เลือกผลลัพธ์ --</option>
      <option value="Potential Lead">Potential Lead</option>
      <option value="Contact Today">Contact Today</option>
      <option value="Contact Again">Contact Again</option>
      <option value="No Potential">No Potential</option>
    </select>
    <input type="text" id="f-result-custom" placeholder="หรือระบุผลลัพธ์อื่นๆ" style="margin-top:8px">
  </div>
  <div style="margin-top:30px; display:flex; gap:10px">
    <button class="btn-primary" onclick="saveData()">💾 บันทึกข้อมูล</button>
  </div>
</div>
