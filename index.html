<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CRM Call Manager - Full Version</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a18">

<style>
:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --border: #e1e4e8;
  --text: #1a1a1b;
  --text-sec: #586069;
  --primary: #007bff;
  --safe-area-bottom: env(safe-area-inset-bottom);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Thai", sans-serif;
  background: var(--bg); color: var(--text); margin: 0; padding: 0;
}

.app-header {
  position: sticky; top: 0; background: var(--surface);
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; z-index: 100;
}
.app-header h1 { font-size: 18px; font-weight: 700; margin: 0; }

.container { padding: 12px; padding-bottom: 100px; max-width: 800px; margin: 0 auto; }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 8px 0 calc(8px + var(--safe-area-bottom)); z-index: 1000;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  color: var(--text-sec); text-decoration: none; font-size: 10px; flex: 1;
}
.nav-item.active { color: var(--primary); }
.nav-item .icon { font-size: 20px; margin-bottom: 4px; }

.card {
  background: var(--surface); border-radius: 12px;
  padding: 16px; margin-bottom: 12px; border: 1px solid var(--border);
}

.customer-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px; background: var(--surface); border-radius: 12px;
  margin-bottom: 8px; border: 1px solid var(--border);
}
.cust-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; color: #000; }
.cust-meta { font-size: 12px; color: var(--text-sec); display: flex; flex-wrap: wrap; gap: 8px; }

.badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
.b-pending { background: #fff3cd; color: #856404; }
.b-contacted { background: #d4edda; color: #155724; }
.b-not { background: #f8d7da; color: #721c24; }

.fab {
  position: fixed; right: 20px; bottom: 85px;
  width: 56px; height: 56px; background: var(--primary);
  border-radius: 28px; display: flex; align-items: center; justify-content: center;
  color: white; font-size: 24px; box-shadow: 0 4px 12px rgba(0,0,123,0.2);
  border: none; z-index: 99;
}

.form-group { margin-bottom: 12px; }
label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-sec); }
input, select, textarea {
  width: 100%; padding: 10px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit;
}

.panel {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: none; align-items: flex-end; z-index: 2000;
}
.panel.active { display: flex; }
.panel-content {
  background: white; width: 100%; max-height: 92vh;
  border-top-left-radius: 20px; border-top-right-radius: 20px;
  overflow-y: auto; padding: 20px;
}

.search-bar { background: white; padding: 10px 16px; position: sticky; top: 53px; z-index: 90; }
.search-input { background: #f1f3f4; border: none; border-radius: 10px; padding: 10px 15px; width: 100%; }

.btn-save { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; margin-top: 10px; }
.btn-delete { width: 100%; padding: 10px; color: #dc3545; background: none; border: 1px solid #dc3545; border-radius: 10px; margin-top: 8px; }

@media (min-width: 801px) {
  .bottom-nav { width: 250px; flex-direction: column; height: 100vh; left: 0; border-right: 1px solid var(--border); border-top: none; justify-content: flex-start; padding-top: 50px; }
  .container { margin-left: 270px; }
  .app-header { margin-left: 250px; }
  .search-bar { margin-left: 250px; }
}
</style>
</head>
<body>

<header class="app-header">
  <h1 id="page-title">รายชื่อลูกค้า</h1>
  <div style="font-size: 12px; color: var(--text-sec);" id="count-label">0 คน</div>
</header>

<div id="search-area" class="search-bar">
  <input type="text" class="search-input" id="search" placeholder="🔍 ค้นหาชื่อ, เบอร์โทร, สถานที่..." oninput="renderList()">
</div>

<main class="container">
  <div id="view-list" class="page">
    <div id="list-container"></div>
  </div>

  <div id="view-dash" class="page" style="display:none">
    <div class="card">
      <label>ภาพรวมข้อมูล</label>
      <div id="dash-stats"></div>
    </div>
  </div>
</main>

<button class="fab" onclick="openAdd()">＋</button>

<nav class="bottom-nav">
  <a href="#" class="nav-item active" onclick="switchPage('list', this)">
    <span class="icon">📋</span><span>รายชื่อ</span>
  </a>
  <a href="#" class="nav-item" onclick="switchPage('dash', this)">
    <span class="icon">📊</span><span>แดชบอร์ด</span>
  </a>
</nav>

<!-- Form Panel -->
<div class="panel" id="form-panel">
  <div class="panel-content">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
      <h2 style="margin:0; font-size:18px;" id="form-title">ข้อมูลลูกค้า</h2>
      <button onclick="closePanel()" style="border:none; background:#eee; width:30px; height:30px; border-radius:15px;">✕</button>
    </div>
    <div id="form-body">
      <!-- Input Fields -->
       <div class="form-group">
        <label>ชื่อลูกค้า (ชื่อ-นามสกุล)</label>
        <input type="text" id="f-name">
      </div>
      <div class="form-group">
        <label>ชื่อเล่น / ตำแหน่ง / ชื่อใน Line</label>
        <input type="text" id="f-nick">
      </div>
      <div class="form-group">
        <label>โทรศัพท์</label>
        <input type="tel" id="f-phone">
      </div>
      <div class="form-group">
        <label>อีเมล</label>
        <input type="email" id="f-email">
      </div>
      <div class="form-group">
        <label>สถานที่ / บริษัทที่สนใจติดตั้ง</label>
        <input type="text" id="f-location">
      </div>
       <div class="form-group">
        <label>แบบฟอร์ม</label>
        <input type="text" id="f-formType">
      </div>
      <div class="form-group">
        <label>เศษอาหารที่เหลือ (กก./วัน)</label>
        <input type="text" id="f-waste">
      </div>
      <div class="form-group">
        <label>เวลาที่สะดวกให้ติดต่อกลับ</label>
        <input type="text" id="f-avail">
      </div>
      <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option>Not Contacted</option>
          <option>Pending</option>
          <option>Contacted</option>
        </select>
      </div>
      <div class="form-group">
        <label>Result (New)</label>
        <input type="text" id="f-result">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="form-group">
          <label>จำนวนที่โทร (T)</label>
          <input type="number" id="f-callT" value="0">
        </div>
        <div class="form-group">
          <label>จำนวนที่โทร (K)</label>
          <input type="number" id="f-callK" value="0">
        </div>
      </div>
      <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
      <div class="form-group">
        <label>Process (Added 25/12/2025)</label>
        <textarea id="f-process" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>strategy</label>
        <textarea id="f-strategy" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>Feedback</label>
        <textarea id="f-feedback" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Following 1</label>
        <input type="text" id="f-follow1">
      </div>
      <div class="form-group">
        <label>Following 3</label>
        <input type="text" id="f-follow3">
      </div>
      <div class="form-group">
        <label>คอลัมน์ 2</label>
        <input type="text" id="f-col2">
      </div>
    </div>
    
    <button class="btn-save" onclick="saveData()">บันทึกข้อมูล</button>
    <div id="delete-area"></div>
    <div style="height: 40px;"></div>
  </div>
</div>

<script>
let DB = JSON.parse(localStorage.getItem('crm_full_v1')) || [];
let editingId = null;

function saveDB() { localStorage.setItem('crm_full_v1', JSON.stringify(DB)); }

function switchPage(page, el) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('view-' + page).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').textContent = page === 'list' ? 'รายชื่อลูกค้า' : 'แดชบอร์ด';
  document.getElementById('search-area').style.display = page === 'list' ? 'block' : 'none';
  if(page === 'dash') renderDash();
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('list-container');
  const filtered = DB.filter(r => 
    (r.name || "").toLowerCase().includes(q) || 
    (r.phone || "").includes(q) || 
    (r.location || "").toLowerCase().includes(q)
  );
  
  document.getElementById('count-label').textContent = filtered.length + ' รายการ';
  
  if(filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center; color:#999; margin-top:40px;">ไม่พบข้อมูล</div>';
    return;
  }

  container.innerHTML = filtered.map(r => `
    <div class="customer-item" onclick="openEdit(${r.id})">
      <div style="flex:1">
        <div class="cust-name">${r.name}</div>
        <div class="cust-meta">
          <span>📞 ${r.phone || '-'}</span>
          <span class="badge ${getStatusClass(r.status)}">${r.status}</span>
        </div>
        <div style="font-size:11px; color:#999; margin-top:4px;">📍 ${r.location || 'ไม่ได้ระบุสถานที่'}</div>
      </div>
      <div style="color:#ccc; font-size:18px;">❯</div>
    </div>
  `).join('');
}

function getStatusClass(s) {
  if(s === 'Contacted') return 'b-contacted';
  if(s === 'Pending') return 'b-pending';
  return 'b-not';
}

function openAdd() {
  editingId = null;
  clearForm();
  document.getElementById('form-title').textContent = "เพิ่มลูกค้าใหม่";
  document.getElementById('delete-area').innerHTML = '';
  document.getElementById('form-panel').classList.add('active');
}

function openEdit(id) {
  editingId = id;
  const data = DB.find(r => r.id === id);
  fillForm(data);
  document.getElementById('form-title').textContent = "แก้ไขข้อมูล";
  document.getElementById('delete-area').innerHTML = `<button class="btn-delete" onclick="deleteData(${id})">ลบข้อมูลลูกค้านี้</button>`;
  document.getElementById('form-panel').classList.add('active');
}

function clearForm() {
  const inputs = document.querySelectorAll('#form-body input, #form-body select, #form-body textarea');
  inputs.forEach(i => i.value = i.type === 'number' ? 0 : '');
  document.getElementById('f-status').value = 'Not Contacted';
}

function fillForm(data) {
  document.getElementById('f-name').value = data.name || '';
  document.getElementById('f-nick').value = data.nick || '';
  document.getElementById('f-phone').value = data.phone || '';
  document.getElementById('f-email').value = data.email || '';
  document.getElementById('f-location').value = data.location || '';
  document.getElementById('f-formType').value = data.formType || '';
  document.getElementById('f-waste').value = data.waste || '';
  document.getElementById('f-avail').value = data.avail || '';
  document.getElementById('f-status').value = data.status || 'Not Contacted';
  document.getElementById('f-result').value = data.result || '';
  document.getElementById('f-callT').value = data.callT || 0;
  document.getElementById('f-callK').value = data.callK || 0;
  document.getElementById('f-process').value = data.process || '';
  document.getElementById('f-strategy').value = data.strategy || '';
  document.getElementById('f-feedback').value = data.feedback || '';
  document.getElementById('f-follow1').value = data.follow1 || '';
  document.getElementById('f-follow3').value = data.follow3 || '';
  document.getElementById('f-col2').value = data.col2 || '';
}

function saveData() {
  const name = document.getElementById('f-name').value;
  if(!name) return alert('กรุณาระบุชื่อลูกค้า');
  
  const payload = {
    id: editingId || Date.now(),
    name,
    nick: document.getElementById('f-nick').value,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value,
    location: document.getElementById('f-location').value,
    formType: document.getElementById('f-formType').value,
    waste: document.getElementById('f-waste').value,
    avail: document.getElementById('f-avail').value,
    status: document.getElementById('f-status').value,
    result: document.getElementById('f-result').value,
    callT: parseInt(document.getElementById('f-callT').value) || 0,
    callK: parseInt(document.getElementById('f-callK').value) || 0,
    process: document.getElementById('f-process').value,
    strategy: document.getElementById('f-strategy').value,
    feedback: document.getElementById('f-feedback').value,
    follow1: document.getElementById('f-follow1').value,
    follow3: document.getElementById('f-follow3').value,
    col2: document.getElementById('f-col2').value,
    updatedAt: new Date().toISOString()
  };

  if(editingId) {
    const idx = DB.findIndex(r => r.id === editingId);
    DB[idx] = payload;
  } else {
    DB.unshift(payload);
  }
  
  saveDB();
  renderList();
  closePanel();
}

function deleteData(id) {
  if(confirm('คุณแน่ใจใช่ไหมที่จะลบข้อมูลลูกค้านี้?')) {
    DB = DB.filter(r => r.id !== id);
    saveDB();
    renderList();
    closePanel();
  }
}

function renderDash() {
  const contacted = DB.filter(r => r.status === 'Contacted').length;
  const pending = DB.filter(r => r.status === 'Pending').length;
  const notContacted = DB.filter(r => r.status === 'Not Contacted').length;
  const total = DB.length;

  document.getElementById('dash-stats').innerHTML = `
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
      <div style="background:#e7f3ff; padding:15px; border-radius:10px; text-align:center;">
        <div style="font-size:24px; font-weight:bold; color:#007bff">${total}</div>
        <div style="font-size:12px;">ลูกค้าทั้งหมด</div>
      </div>
      <div style="background:#d4edda; padding:15px; border-radius:10px; text-align:center;">
        <div style="font-size:24px; font-weight:bold; color:#28a745">${contacted}</div>
        <div style="font-size:12px;">ติดต่อแล้ว</div>
      </div>
      <div style="background:#fff3cd; padding:15px; border-radius:10px; text-align:center;">
        <div style="font-size:24px; font-weight:bold; color:#856404">${pending}</div>
        <div style="font-size:12px;">รอติดตาม</div>
      </div>
      <div style="background:#f8d7da; padding:15px; border-radius:10px; text-align:center;">
        <div style="font-size:24px; font-weight:bold; color:#721c24">${notContacted}</div>
        <div style="font-size:12px;">ยังไม่ติดต่อ</div>
      </div>
    </div>
  `;
}

function closePanel() { document.getElementById('form-panel').classList.remove('active'); }

// Start App
renderList();
</script>
</body>
</html>
